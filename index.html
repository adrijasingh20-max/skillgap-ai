<!DOCTYPE html>
<html lang="en">
  <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SkillGap AI</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

  <!-- Modern Font -->
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<div class="container">

  <!-- HERO -->
  <div class="hero">
    <h1>🚀 SkillGap AI</h1>
    <p>AI-Powered Career Alignment & Skill Intelligence</p>
  </div>


  <!-- INPUT CARD -->
  <div class="card input-card">
    <input type="file" id="pdfUpload" accept="application/pdf">
    <textarea id="resume" placeholder="Paste your resume here..."></textarea>

    <div class="row">
      <select id="role"></select>
      <button id="analyzeBtn">Analyze</button>
    </div>
  </div>

  <!-- RESULTS -->
  <div id="output" class="hidden">

    <div class="card score-card">
      <h2 id="score"></h2>
    </div>

    <div class="grid">

      <div class="card">
        <h3>Matched Skills</h3>
        <div id="matched" class="chip-container"></div>
      </div>

      <div class="card">
        <h3>Missing Skills</h3>
        <div id="missing" class="chip-container"></div>
      </div>

    </div>

    <div class="card">
      <h3>Market Demand</h3>
      <canvas id="marketChart"></canvas>
    </div>

    <div class="card">
      <h3>Personalized Roadmap</h3>
      <div id="roadmap"></div>
    </div>

    <div class="card">
      <h3>Skill Simulation</h3>
      <div id="simulate"></div>
    </div>

  </div>

</div>


<script src="script.js"></script>
</body>
</html>
